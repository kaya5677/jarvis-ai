    <!-- Service Worker -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js').then(registration => {
                console.log('ServiceWorker registration successful');
            }).catch(err => {
                console.log('ServiceWorker registration failed: ', err);
            });
        }
    </script>
    
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Language Switcher -->
        <div class="language-switcher">
            <button class="lang-btn active" id="langMs" data-lang="ms">Bahasa Melayu</button>
            <button class="lang-btn" id="langEn" data-lang="en">English</button>
        </div>

        <!-- Jarvis Header -->
        <div class="jarvis-header">
            <div class="jarvis-logo">
                <div class="logo-circle">
                    <div class="logo-inner"></div>
                </div>
                <h1>JARVIS</h1>
                <p class="status" id="status">Bersedia untuk mendengar...</p>
            </div>
        </div>

        <!-- Chat Container -->
        <div class="chat-container" id="chatContainer">
            <div class="chat-message jarvis-message">
                <div class="message-content">
                    <div class="jarvis-avatar">J</div>
                    <div class="message-text">
                        <p data-ms="Halo! Saya JARVIS, pembantu AI anda. Saya boleh membantu anda dengan pelbagai perkara. Cuba klik butang mikrofon atau taip mesej anda." data-en="Hello! I'm JARVIS, your AI assistant. I can help you with various things. Try clicking the microphone button or type your message.">Halo! Saya JARVIS, pembantu AI anda. Saya boleh membantu anda dengan pelbagai perkara. Cuba klik butang mikrofon atau taip mesej anda.</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Input Area -->
        <div class="input-area">
            <div class="input-container">
                <input type="text" id="textInput" placeholder="Taip mesej anda atau gunakan mikrofon..." autocomplete="off" data-placeholder-ms="Taip mesej anda atau gunakan mikrofon..." data-placeholder-en="Type your message or use microphone...">
                <div class="button-group">
                    <button class="btn-auto-mic" id="autoMicButton" title="Auto Mic" data-title-ms="Auto Mikrofon" data-title-en="Auto Mic">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"></circle>
                            <circle cx="12" cy="12" r="3"></circle>
                            <circle cx="12" cy="12" r="6" fill="none"></circle>
                        </svg>
                        <span class="auto-mic-indicator">AUTO</span>
                    </button>
                    <button class="btn-microphone" id="micButton" title="Klik untuk bercakap" data-title-ms="Klik untuk bercakap" data-title-en="Click to speak">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
                            <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                        <line x1="12" y1="19" x2="12" y2="23"></line>
                        <line x1="8" y1="23" x2="16" y2="23"></line>
                    </svg>
                </button>
                <button class="btn-send" id="sendButton" title="Hantar mesej" data-title-ms="Hantar mesej" data-title-en="Send message">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </div>
            <div class="voice-status" id="voiceStatus"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
